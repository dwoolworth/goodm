site_name: goodm
site_url: https://goodm.io
site_description: A schema-driven ODM for MongoDB in Go
repo_url: https://github.com/dwoolworth/goodm
repo_name: dwoolworth/goodm

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
    - Models & Tags: models.md
    - CRUD Operations: crud.md
    - Hooks: hooks.md
    - Validation: validation.md
    - Middleware: middleware.md
    - Population: populate.md
    - Aggregation: pipeline.md
    - Bulk Operations: bulk.md
    - Transactions: transactions.md
  - CLI:
    - Commands: cli.md
  - Design Decisions: design-decisions.md

docs_dir: site-docs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dwoolworth/goodm
